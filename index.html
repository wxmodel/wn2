
<!DOCTYPE html>
<html>
<head>
    <title>WN2 Multi-Product Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background:#1f1f1f;
            color:#efefef;
            font-family:system-ui, sans-serif;
            text-align:center;
            margin:0;
            padding-bottom:168px;
        }
        .wrap { max-width:1240px; margin:0 auto; padding:14px 10px 18px; }
        .map-wrap { background:#111; border:1px solid #4f4f4f; }
        img { width:100%; height:auto; display:block; background:#111; }
        button {
            padding:10px 16px;
            font-size:16px;
            cursor:pointer;
            border:1px solid #666;
            background:#2d2d2d;
            color:#f1f1f1;
            border-radius:8px;
        }
        select {
            padding:8px 10px;
            font-size:15px;
            border-radius:8px;
            border:1px solid #666;
            background:#2a2a2a;
            color:#f1f1f1;
            min-width:120px;
        }
        .meta {
            margin:4px 0 10px;
            font-size:14px;
            color:#cecece;
        }
        #status {
            min-height:20px;
            margin-bottom:10px;
            color:#ffc9b3;
            font-size:14px;
        }
        #label {
            display:inline-block;
            min-width:120px;
            font-weight:700;
            letter-spacing:0.03em;
        }
        .bottom-controls {
            position:fixed;
            left:0;
            right:0;
            bottom:0;
            background:#141414;
            border-top:1px solid #3c3c3c;
            padding:10px 10px 12px;
            box-shadow:0 -6px 16px rgba(0, 0, 0, 0.35);
        }
        .row {
            max-width:1240px;
            margin:0 auto;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-wrap:wrap;
            gap:10px;
        }
        #hourSlider {
            width:min(960px, 94vw);
            height:34px;
            touch-action:pan-x;
        }
        @media (max-width: 760px) {
            h2 { font-size:20px; margin:10px 0; }
            button { font-size:14px; padding:8px 12px; }
            select { font-size:14px; min-width:96px; }
            #label { min-width:86px; }
            body { padding-bottom:210px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h2 id="title">WeatherNext 2 Map Viewer</h2>
        <div id="meta" class="meta"></div>
        <div id="status"></div>
        <div class="map-wrap">
            <img id="map" src="" alt="WN2 map">
        </div>
    </div>

    <div class="bottom-controls">
        <div class="row">
            <label for="run">Run:</label>
            <select id="run"></select>
            <label for="product">Map:</label>
            <select id="product"></select>
            <label for="snowRatio">Snow Ratio:</label>
            <select id="snowRatio"></select>
        </div>
        <div class="row" style="margin-top:8px;">
            <button id="prevBtn">Prev</button>
            <span id="label">Hour ---</span>
            <button id="nextBtn">Next</button>
        </div>
        <div class="row" style="margin-top:6px;">
            <input type="range" id="hourSlider" min="0" max="0" step="1" value="0">
        </div>
    </div>

    <script>
        const manifest = {"generated_utc":"2026-02-25T02:08:28Z","history_hours":72,"default_run_id":"2026021906","snow_products":["conus_snow_accum","ne_snow_accum","ne_zoom_snow_accum"],"product_labels":{"nh_z500a":"NH 500mb Height Anomaly","na_z500a":"North America 500mb Height Anomaly","conus_mslp_ptype":"CONUS MSLP + P-Type","ne_mslp_ptype":"Northeast MSLP + P-Type","conus_vort500":"CONUS 500mb Vorticity","conus_snow_accum":"CONUS Snowfall Accumulation","ne_snow_accum":"Northeast Snowfall Accumulation","ne_zoom_snow_accum":"New England Zoom Snowfall Accumulation"},"runs":[{"id":"2026022418","label":"2026-02-24 18Z","run_date":"202602241800_202602250000_0","init_utc":"2026-02-24T18:00:00Z","hours":[6],"products":["nh_z500a","na_z500a","conus_mslp_ptype","ne_mslp_ptype","conus_vort500","conus_snow_accum","ne_snow_accum","ne_zoom_snow_accum"],"snow_ratios":[10,12,15,20],"updated_utc":"2026-02-25T01:49:16Z"},{"id":"2026021912","label":"2026-02-19 12Z","run_date":"202602191200_202602191800_0","init_utc":"2026-02-19T12:00:00Z","hours":[180],"products":["ne_zoom_snow_accum"],"snow_ratios":[10,15],"updated_utc":"2026-02-25T01:35:33Z"},{"id":"2026021906","label":"2026-02-19 06Z","run_date":"202602190600_202602191200_0","init_utc":"2026-02-19T06:00:00Z","hours":[138],"products":["ne_zoom_snow_accum"],"snow_ratios":[10,15],"updated_utc":"2026-02-25T02:08:28Z"},{"id":"2026021900","label":"2026-02-19 00Z","run_date":"202602190000_202602190600_0","init_utc":"2026-02-19T00:00:00Z","hours":[120],"products":["ne_zoom_snow_accum"],"snow_ratios":[10,15],"updated_utc":"2026-02-25T01:50:34Z"},{"id":"2026021818","label":"2026-02-18 18Z","run_date":"202602181800_202602190000_0","init_utc":"2026-02-18T18:00:00Z","hours":[138],"products":["ne_zoom_snow_accum"],"snow_ratios":[10,15],"updated_utc":"2026-02-25T02:06:29Z"},{"id":"2026021812","label":"2026-02-18 12Z","run_date":"202602181200_202602181800_0","init_utc":"2026-02-18T12:00:00Z","hours":[138],"products":["ne_zoom_snow_accum"],"snow_ratios":[10,15],"updated_utc":"2026-02-25T02:02:29Z"},{"id":"2026021800","label":"2026-02-18 00Z","run_date":"202602180000_202602180600_0","init_utc":"2026-02-18T00:00:00Z","hours":[138],"products":["ne_zoom_snow_accum"],"snow_ratios":[10,15],"updated_utc":"2026-02-25T01:56:36Z"}]};
        const runs = Array.isArray(manifest.runs) ? manifest.runs : [];
        const snowProducts = new Set(Array.isArray(manifest.snow_products) ? manifest.snow_products : []);
        const productLabels = (manifest.product_labels && typeof manifest.product_labels === 'object') ? manifest.product_labels : {};
        let activeHours = [];
        let idx = 0;

        const mapEl = document.getElementById('map');
        const titleEl = document.getElementById('title');
        const metaEl = document.getElementById('meta');
        const statusEl = document.getElementById('status');
        const labelEl = document.getElementById('label');
        const runEl = document.getElementById('run');
        const productEl = document.getElementById('product');
        const ratioEl = document.getElementById('snowRatio');
        const sliderEl = document.getElementById('hourSlider');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function normalizeIntList(values, minValue, maxValue) {
            if (!Array.isArray(values)) return [];
            const out = [];
            for (const raw of values) {
                const n = Number(raw);
                if (!Number.isInteger(n)) continue;
                if (minValue !== null && n < minValue) continue;
                if (maxValue !== null && n > maxValue) continue;
                out.push(n);
            }
            return Array.from(new Set(out)).sort((a, b) => a - b);
        }

        function getCurrentRun() {
            const selected = runEl.value;
            for (const run of runs) {
                if (String(run.id) === selected) return run;
            }
            return runs.length ? runs[0] : null;
        }

        function setSelectOptions(selectEl, values, labelFn) {
            const prev = selectEl.value;
            selectEl.innerHTML = '';
            for (const value of values) {
                const option = document.createElement('option');
                option.value = String(value);
                option.textContent = labelFn(value);
                selectEl.appendChild(option);
            }
            for (const value of values) {
                if (String(value) === prev) {
                    selectEl.value = prev;
                    return;
                }
            }
            if (values.length) {
                selectEl.value = String(values[0]);
            }
        }

        function buildFrameName(product, hour, ratio) {
            const hourStr = String(hour).padStart(3, '0');
            if (snowProducts.has(product)) {
                const ratioStr = String(ratio).padStart(2, '0');
                return product + '_r' + ratioStr + '_' + hourStr + '.jpg';
            }
            return product + '_' + hourStr + '.jpg';
        }

        function syncRunScopedControls() {
            const run = getCurrentRun();
            if (!run) {
                activeHours = [];
                productEl.innerHTML = '';
                ratioEl.innerHTML = '';
                sliderEl.max = '0';
                sliderEl.value = '0';
                idx = 0;
                return;
            }
            const products = Array.isArray(run.products) ? run.products : [];
            const ratios = normalizeIntList(run.snow_ratios, 10, 20);
            const hours = normalizeIntList(run.hours, 0, null);
            setSelectOptions(productEl, products, (key) => productLabels[key] || key);
            setSelectOptions(ratioEl, ratios.length ? ratios : [10], (ratio) => ratio + ':1');

            const previousHour = activeHours[idx];
            activeHours = hours;
            if (activeHours.length === 0) {
                idx = 0;
            } else {
                const found = activeHours.indexOf(previousHour);
                idx = found >= 0 ? found : 0;
            }
            sliderEl.max = String(Math.max(0, activeHours.length - 1));
            sliderEl.value = String(idx);
        }

        function render() {
            const run = getCurrentRun();
            if (!run || !activeHours.length || !productEl.value) {
                mapEl.src = '';
                labelEl.innerText = 'No hours';
                titleEl.innerText = 'WeatherNext 2 Map Viewer';
                metaEl.innerText = '';
                statusEl.innerText = runs.length ? 'No frames available for this run.' : 'No runs available.';
                return;
            }

            const product = productEl.value;
            const isSnow = snowProducts.has(product);
            ratioEl.disabled = !isSnow;
            if (!isSnow) {
                ratioEl.title = 'Snow ratio applies to snowfall accumulation maps only.';
            } else {
                ratioEl.title = '';
            }

            const hour = activeHours[idx];
            const ratio = Number(ratioEl.value || 10);
            const frameName = buildFrameName(product, hour, ratio);
            const runId = String(run.id);
            const runLabel = run.label || runId;
            const initUtc = run.init_utc || 'unknown';
            const hourStr = String(hour).padStart(3, '0');

            mapEl.src = 'runs/' + runId + '/' + frameName;
            mapEl.alt = runId + ' ' + product + ' hour ' + hourStr;
            labelEl.innerText = 'Hour ' + hourStr;
            titleEl.innerText = 'WeatherNext 2 Map Viewer: ' + (run.run_date || runLabel);
            metaEl.innerText = 'Run ' + runLabel + ' | Init ' + initUtc + (isSnow ? ' | Ratio ' + ratio + ':1' : '');
            statusEl.innerText = '';
        }

        function change(dir) {
            if (!activeHours.length) return;
            idx = (idx + dir + activeHours.length) % activeHours.length;
            sliderEl.value = String(idx);
            render();
        }

        mapEl.addEventListener('error', () => {
            statusEl.innerText = 'Selected frame is missing for this run/product/hour/ratio.';
        });
        mapEl.addEventListener('load', () => {
            statusEl.innerText = '';
        });

        runEl.addEventListener('change', () => {
            syncRunScopedControls();
            render();
        });
        productEl.addEventListener('change', render);
        ratioEl.addEventListener('change', render);
        sliderEl.addEventListener('input', () => {
            idx = Number(sliderEl.value);
            render();
        });
        prevBtn.addEventListener('click', () => change(-1));
        nextBtn.addEventListener('click', () => change(1));

        setSelectOptions(runEl, runs.map((run) => run.id), (id) => {
            const run = runs.find((item) => String(item.id) === String(id));
            return run ? (run.label || String(id)) : String(id);
        });
        if (runs.length) {
            const defaultId = runs.some((run) => String(run.id) === String(manifest.default_run_id))
                ? String(manifest.default_run_id)
                : String(runs[0].id);
            runEl.value = defaultId;
        }
        syncRunScopedControls();
        render();
    </script>
</body>
</html>
