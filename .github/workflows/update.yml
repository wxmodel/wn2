name: WeatherNext Auto-Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      preview_one_frame:
        description: "Generate one frame per product (quick preview)"
        required: false
        default: false
        type: boolean
      hours_csv:
        description: "Optional explicit forecast hours (e.g. 6,12,18)"
        required: false
        default: ""
        type: string
      hour_range_preset:
        description: "Manual range preset (0 to selected hour, using native step)"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - "24"
          - "36"
          - "48"
          - "72"
          - "120"
          - "180"
          - "240"
      run_init_utc:
        description: "Optional run init UTC override (example: 2026-02-22T12:00:00Z)"
        required: false
        default: ""
        type: string
      snow_ratio_csv:
        description: "Snow ratios to render (10-20, comma-separated; e.g. 10,12,15,20)"
        required: false
        default: "10,12,15,20"
        type: string
      run_history_hours:
        description: "Run history retention window in hours (6-72)"
        required: false
        default: "24"
        type: string
      product_mode:
        description: "Product selection mode"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - custom
      run_nh_z500a:
        description: "Generate NH 500mb anomaly"
        required: false
        default: true
        type: boolean
      run_na_z500a:
        description: "Generate NA 500mb anomaly"
        required: false
        default: true
        type: boolean
      run_conus_mslp_ptype:
        description: "Generate CONUS MSLP + P-Type"
        required: false
        default: true
        type: boolean
      run_ne_mslp_ptype:
        description: "Generate Northeast MSLP + P-Type"
        required: false
        default: true
        type: boolean
      run_conus_vort500:
        description: "Generate CONUS 500mb vorticity"
        required: false
        default: true
        type: boolean
      run_conus_t2m:
        description: "Generate USA region 2m temperature"
        required: false
        default: true
        type: boolean
      run_conus_t2m_anom:
        description: "Generate USA region 2m temperature anomaly"
        required: false
        default: true
        type: boolean
      run_conus_snow_accum:
        description: "Generate CONUS snowfall accumulation"
        required: false
        default: true
        type: boolean
      run_ne_snow_accum:
        description: "Generate Northeast snowfall accumulation"
        required: false
        default: true
        type: boolean
      run_ne_zoom_snow_accum:
        description: "Generate New England zoom snowfall accumulation"
        required: false
        default: true
        type: boolean
  
concurrency:
  group: wn2-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Libraries
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Recent Runs From gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "${REMOTE_URL}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${REMOTE_URL}" .gh-pages
            if [ -f .gh-pages/runs_manifest.json ]; then
              cp .gh-pages/runs_manifest.json public/runs_manifest.json
            fi
            if [ -d .gh-pages/runs ]; then
              mkdir -p public/runs
              cp -R .gh-pages/runs/. public/runs/
            fi
          else
            echo "No gh-pages branch yet; starting with a fresh public/ directory."
          fi

      - name: Run Map Generator
        id: map_generator
        continue-on-error: true
        env:
          EE_KEY: ${{ secrets.EE_KEY }}
          EE_PROJECT: ${{ secrets.EE_PROJECT }}
          HOURS_MAX: ${{ github.event_name == 'schedule' && '240' || (github.event_name == 'workflow_dispatch' && github.event.inputs.hour_range_preset != 'full' && github.event.inputs.hour_range_preset || '') }}
          HOURS_LIMIT: ${{ github.event_name == 'push' && '1' || (github.event_name == 'workflow_dispatch' && github.event.inputs.preview_one_frame == 'true' && '1' || '') }}
          HOURS_CSV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hours_csv || '' }}
          RUN_INIT_UTC: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_init_utc || '' }}
          SNOW_RATIO_CSV: ${{ github.event_name == 'schedule' && '10,12,15,20' || (github.event_name == 'workflow_dispatch' && github.event.inputs.snow_ratio_csv || '10,12,15,20') }}
          RUN_HISTORY_HOURS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_history_hours || '24' }}
          FAST_RENDER: ${{ github.event_name == 'schedule' && '1' || '' }}
          EXPORT_WORKERS: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '2' || '2' }}
          WN2_PRODUCT_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.product_mode || 'all' }}
          WN2_RUN_NH_Z500A: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_nh_z500a == 'true' && '1' || '')) }}
          WN2_RUN_NA_Z500A: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_na_z500a == 'true' && '1' || '')) }}
          WN2_RUN_CONUS_MSLP_PTYPE: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_conus_mslp_ptype == 'true' && '1' || '')) }}
          WN2_RUN_NE_MSLP_PTYPE: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_ne_mslp_ptype == 'true' && '1' || '')) }}
          WN2_RUN_CONUS_VORT500: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_conus_vort500 == 'true' && '1' || '')) }}
          WN2_RUN_CONUS_T2M: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_conus_t2m == 'true' && '1' || '')) }}
          WN2_RUN_CONUS_T2M_ANOM: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_conus_t2m_anom == 'true' && '1' || '')) }}
          WN2_RUN_CONUS_SNOW_ACCUM: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_conus_snow_accum == 'true' && '1' || '')) }}
          WN2_RUN_NE_SNOW_ACCUM: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_ne_snow_accum == 'true' && '1' || '')) }}
          WN2_RUN_NE_ZOOM_SNOW_ACCUM: ${{ github.event_name != 'workflow_dispatch' && '1' || (github.event.inputs.product_mode != 'custom' && '1' || (github.event.inputs.run_ne_zoom_snow_accum == 'true' && '1' || '')) }}
        run: python main.py

      - name: Report generator failure
        if: ${{ steps.map_generator.outcome == 'failure' }}
        run: |
          echo "Map generator step failed; deploying retained/partial outputs from public/."

      - name: Deploy to GitHub Pages
        if: ${{ always() }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
